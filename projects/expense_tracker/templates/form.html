{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h5 class="fw-bold mb-4">
        <i class="bi bi-{{ 'pencil' if expense else 'plus-circle' }} me-2"></i>
        {{ "Edit Expense" if expense else "Add New Expense" }}
      </h5>
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Title <span class="text-danger">*</span></label>
          <input type="text" name="title" class="form-control"
                 value="{{ expense.title if expense else '' }}" placeholder="e.g. Grocery shopping" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Amount (₹) <span class="text-danger">*</span></label>
          <input type="number" name="amount" class="form-control" step="0.01" min="0"
                 value="{{ expense.amount if expense else '' }}" placeholder="0.00" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Category <span class="text-danger">*</span></label>
          <select name="category" class="form-select" required>
            <option value="">-- Select Category --</option>
            {% for cat in ["Food", "Transport", "Health", "Shopping", "Bills", "Entertainment", "Education", "Other"] %}
              <option value="{{ cat }}" {% if expense and expense.category == cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Date <span class="text-danger">*</span></label>
          <input type="date" name="date" class="form-control"
                 value="{{ expense.date if expense else today }}" required>
        </div>
        <div class="mb-4">
          <label class="form-label">Note <span class="text-muted small">(optional)</span></label>
          <textarea name="note" class="form-control" rows="2"
                    placeholder="Any additional details...">{{ expense.note if expense else '' }}</textarea>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary px-4">
            <i class="bi bi-check-lg me-1"></i>{{ "Update" if expense else "Save" }}
          </button>
          <a href="/" class="btn btn-outline-secondary px-4">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
